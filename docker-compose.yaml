services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 8080:8080
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    env_file:
      - .env
    mem_limit: 900m
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  postgres:
    image: postgres:16-alpine
    container_name: evolution_postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=80
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
    environment:
      POSTGRES_USER: user
      POSTGRES_DB: evolution_db
      POSTGRES_PASSWORD: 1010
    expose:
      - '5432'
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d evolution_db']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ''
      - --appendonly
      - 'no'
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    expose:
      - '6379'
    networks:
      - evolution-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'

volumes:
  evolution_instances:
  evolution_postgres_data:
  
networks:
  evolution-net:
    name: evolution-net
    driver: bridge
